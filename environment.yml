name: agentic_scrna_cluster

channels:
  - conda-forge
  - bioconda

dependencies:
  - python=3.11

  # Core scientific stack
  - numpy
  - pandas
  - scipy
  - matplotlib
  - scikit-learn
  - scikit-misc
  
  # Single-cell analysis
  - scanpy
  - anndata
  - python-igraph
  - leidenalg

  # Notebook environment
  - jupyterlab
  - ipykernel
  - ipywidgets

  # Utilities
  - pip

  - pip:
      - langchain
      - langgraph
      - langchain-openai
      - python-dotenv
      - pydantic